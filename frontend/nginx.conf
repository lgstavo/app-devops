server {
    # O Nginx vai escutar na porta 80 dentro do contêiner
    listen 80;

    # Localização padrão para servir seu app Vue.js
    location / {
        # O Nginx procurará os arquivos nesta pasta dentro do contêiner
        root /usr/share/nginx/html;
        index index.html;
        # Esta linha é crucial para o Vue Router funcionar corretamente
        try_files $uri $uri/ /index.html;
    }

    # Localização para todas as chamadas de API
    # Qualquer requisição para /api/... será capturada aqui
    location /api/ {
        # Esta é a mágica: o Nginx vai encaminhar a requisição
        # para o serviço 'backend' na porta 8080, usando a rede Docker.
        proxy_pass http://backend:8080;

        # Cabeçalhos importantes para passar junto com a requisição
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}