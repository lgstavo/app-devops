apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Aponta para o serviço criado pelo subchart 'frontend'
                name: {{ .Release.Name }}-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                # Aponta para o serviço criado pelo subchart 'backend'
                name: {{ .Release.Name }}-backend
                port:
                  number: 8080
